name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '^1.26.0'
      - uses: oven-sh/setup-bun@v2
      - name: Build frontend
        run: bun install && bun run build
        working-directory: web
      - name: Build
        run: go run build.go
        env:
          BUILD_REPO: ${{ github.repository }}
      - name: Create Latest Release
        run: |
          VERSION=$(cat bin/version.txt)
          if gh release view latest --repo ${{ github.repository }} &>/dev/null; then
            gh release delete latest --yes --repo ${{ github.repository }}
          fi
          gh release create latest --repo ${{ github.repository }} \
            --title "runic $VERSION" \
            --prerelease \
            bin/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
