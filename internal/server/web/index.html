<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>runic</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div id="app"></div>

  <script>
    const { createApp, ref, onMounted, onUnmounted, computed, watch } = Vue
    const { createRouter, createWebHistory, useRoute, useRouter } = VueRouter

    async function fetchJSON(url) {
      const res = await fetch(url)
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`)
      return res.json()
    }

    function statusClass(s) {
      return { RUNNING: 'bg-yellow-600', SUCCESS: 'bg-emerald-600', FAILED: 'bg-red-600', TIMEOUT: 'bg-orange-600' }[s] || 'bg-gray-600'
    }

    function formatMs(ms) {
      if (!ms && ms !== 0) return '-'
      return ms < 1000 ? ms + 'ms' : (ms / 1000).toFixed(1) + 's'
    }

    function formatDate(ts) {
      return ts ? new Date(ts).toLocaleString() : '-'
    }

    function patchHistory(current, updates) {
      if (!Array.isArray(updates)) return current
      var res = [...current]
      for (var i = 0; i < updates.length; i++) {
        var u = updates[i]
        var found = false
        for (var j = 0; j < res.length; j++) {
          if (res[j].id === u.id) {
            res[j] = Object.assign({}, res[j], u)
            found = true
            break
          }
        }
        if (!found) res.push(u)
      }
      res.sort((a, b) => b.id - a.id)
      return res.slice(0, 100)
    }

    function formatTimeout(seconds) {
      return seconds < 60 ? seconds + 's' : Math.floor(seconds / 60) + 'm'
    }

    const AppLayout = {
      props: ['toast'],
      emits: ['toast'],
      delimiters: ['[[', ']]'],
      template: `
        <div class="min-h-screen bg-gray-950 text-gray-100">
          <nav class="border-b border-gray-800 px-6 flex items-center gap-1">
            <router-link to="/" class="text-sm px-3 py-3 transition border-b-2" :class="activeTab === 'runic' ? 'border-emerald-500 text-white font-medium' : 'border-transparent text-gray-400 hover:text-white'">Runic</router-link>
            <router-link to="/actions" class="text-sm px-3 py-3 transition border-b-2" :class="activeTab === 'actions' ? 'border-emerald-500 text-white font-medium' : 'border-transparent text-gray-400 hover:text-white'">Actions</router-link>
            <router-link to="/executions" class="text-sm px-3 py-3 transition border-b-2" :class="activeTab === 'executions' ? 'border-emerald-500 text-white font-medium' : 'border-transparent text-gray-400 hover:text-white'">Executions</router-link>
          </nav>
          <main class="max-w-7xl mx-auto p-6"><slot></slot></main>
          <div v-if="toast" class="fixed bottom-6 right-6 z-50 px-4 py-3 bg-emerald-600 text-white rounded-lg shadow-lg text-sm font-medium">[[ toast ]]</div>
        </div>
      `,
      setup() {
        const route = useRoute()
        const activeTab = computed(function() {
          var p = route.path
          if (p === '/') return 'runic'
          if (p === '/executions') return 'executions'
          if (p.match(/^\/actions\/[^/]+\/history/)) return 'executions'
          if (p.match(/^\/actions\//)) return 'actions'
          return 'actions'
        })
        return { activeTab }
      }
    }

    const Dashboard = {
      delimiters: ['[[', ']]'],
      template: `
        <AppLayout :toast="toast" @toast="v => toast = v">
          <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-semibold">Overview</h1>
            <button @click="refresh" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-sm font-medium transition">Refresh</button>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div>
              <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-semibold text-gray-300">Recent Actions</h2>
                <router-link to="/actions" class="text-xs text-emerald-400 hover:text-emerald-300">View all →</router-link>
              </div>
              <div v-if="actionLoading" class="text-gray-600 text-sm bg-gray-900 rounded-lg border border-gray-800 px-4 py-6 text-center">Loading...</div>
              <div v-else-if="recentActions.length === 0" class="text-gray-600 text-sm bg-gray-900 rounded-lg border border-gray-800 px-4 py-6 text-center">No actions yet.</div>
              <div v-else class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                <div v-for="a in recentActions" :key="a.id" class="bg-gray-900 border border-gray-800 rounded-lg p-3">
                  <router-link :to="'/actions/' + a.id" class="font-mono text-emerald-400 hover:underline text-sm">[[ a.name || a.id ]]</router-link>
                  <div class="text-[11px] text-gray-500 font-mono truncate mt-1">[[ a.command ]]</div>
                </div>
              </div>
            </div>

            <div>
              <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-semibold text-gray-300">Recent Executions</h2>
                <router-link to="/executions" class="text-xs text-emerald-400 hover:text-emerald-300">View all →</router-link>
              </div>
              <div v-if="loading" class="text-gray-600 text-sm bg-gray-900 rounded-lg border border-gray-800 px-4 py-6 text-center">Loading...</div>
              <div v-else-if="history.length === 0" class="text-gray-600 text-sm bg-gray-900 rounded-lg border border-gray-800 px-4 py-6 text-center">No executions yet.</div>
              <div v-else class="overflow-x-auto rounded-lg border border-gray-800">
                <table class="w-full text-sm">
                  <thead class="bg-gray-900 text-gray-400 uppercase text-xs">
                    <tr>
                      <th class="px-4 py-2 text-left w-16">ID</th>
                      <th class="px-4 py-2 text-left">Action</th>
                      <th class="px-4 py-2 text-left w-24">Status</th>
                      <th class="px-4 py-2 text-left w-20">Duration</th>
                      <th class="px-4 py-2 text-left w-20">Log</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-gray-800/60">
                    <tr v-for="e in history.slice(0, 5)" :key="e.id" class="hover:bg-gray-900/50 transition">
                      <td class="px-4 py-2 font-mono text-gray-600">[[ e.id ]]</td>
                      <td class="px-4 py-2"><router-link :to="'/actions/' + e.action_id" class="font-mono text-emerald-300 hover:underline text-xs">[[ e.action_id ]]</router-link></td>
                      <td class="px-4 py-2"><span :class="statusClass(e.status)" class="px-2 py-0.5 rounded text-xs font-bold text-white">[[ e.status ]]</span></td>
                      <td class="px-4 py-2 text-gray-400 text-xs">[[ formatMs(e.duration_ms) ]]</td>
                      <td class="px-4 py-2"><router-link :to="'/actions/' + e.action_id + '/history/' + e.id" class="text-blue-400 hover:text-blue-300 text-xs font-medium">View</router-link></td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </AppLayout>
      `,
      components: { AppLayout },
      setup() {
        const history = ref([])
        const loading = ref(true)
        const actions = ref([])
        const actionLoading = ref(true)
        const toast = ref('')
        const recentActions = computed(function() {
          var h = history.value
          if (!Array.isArray(h)) return []
          var seen = {}
          var result = []
          for (var i = 0; i < h.length; i++) {
            var aid = h[i].action_id
            if (!seen[aid]) {
              seen[aid] = true
              for (var j = 0; j < actions.value.length; j++) {
                if (actions.value[j].id === aid) {
                  result.push(actions.value[j])
                  break
                }
              }
            }
            if (result.length >= 4) break
          }
          return result
        })
        let pollTimer = null

        async function refreshHistory() {
          loading.value = true
          try {
            var h = await fetchJSON('/api/history')
            history.value = Array.isArray(h) ? h : []
          } catch (e) { console.error(e); history.value = [] }
          loading.value = false
        }

        async function pollHistory() {
          var running = history.value.filter(e => e.status === 'RUNNING').map(e => e.id)
          var url = running.length > 0 ? '/api/history?ids=' + running.join(',') : '/api/history'
          try {
            var h = await fetchJSON(url)
            history.value = patchHistory(history.value, h)
          } catch (e) { console.error(e) }
        }

        async function refreshActions() {
          actionLoading.value = true
          try {
            var a = await fetchJSON('/api/actions')
            actions.value = Array.isArray(a) ? a : []
          } catch (e) { console.error(e); actions.value = [] }
          actionLoading.value = false
        }

        function refresh() {
          refreshHistory()
          refreshActions()
        }

        onMounted(function() {
          refresh()
          pollTimer = setInterval(pollHistory, 3000)
        })

        onUnmounted(function() {
          if (pollTimer) clearInterval(pollTimer)
        })

        return { history, loading, actions, actionLoading, recentActions, toast, refresh, statusClass, formatMs, formatDate }
      }
    }

    const ExecutionList = {
      delimiters: ['[[', ']]'],
      template: `
        <AppLayout :toast="toast" @toast="v => toast = v">
          <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-semibold">Executions</h1>
            <div class="flex gap-2">
              <button @click="cleanLogs" :disabled="cleaning" class="px-3 py-1.5 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-lg text-sm font-medium transition disabled:opacity-50">
                [[ cleaning ? 'Cleaning...' : 'Clean Logs' ]]
              </button>
              <button @click="refresh" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-sm font-medium transition">Refresh</button>
            </div>
          </div>
          <div v-if="initialLoading" class="text-gray-600 text-sm">Loading...</div>
          <div v-else-if="history.length === 0" class="text-gray-600 text-sm bg-gray-900 rounded-lg border border-gray-800 px-4 py-8 text-center">No executions yet.</div>
          <div v-else class="overflow-x-auto rounded-lg border border-gray-800">
            <table class="w-full text-sm">
              <thead class="bg-gray-900 text-gray-400 uppercase text-xs">
                <tr>
                  <th class="px-4 py-3 text-left w-16">ID</th>
                  <th class="px-4 py-3 text-left">Action</th>
                  <th class="px-4 py-3 text-left w-28">Status</th>
                  <th class="px-4 py-3 text-left w-24">Duration</th>
                  <th class="px-4 py-3 text-left w-48">Time</th>
                  <th class="px-4 py-3 text-left w-20">Log</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-800/60">
                <tr v-for="e in history" :key="e.id" class="hover:bg-gray-900/50 transition">
                  <td class="px-4 py-3 font-mono text-gray-600">[[ e.id ]]</td>
                  <td class="px-4 py-3"><router-link :to="'/actions/' + e.action_id" class="font-mono text-emerald-300 hover:underline">[[ e.action_id ]]</router-link></td>
                  <td class="px-4 py-3"><span :class="statusClass(e.status)" class="px-2 py-1 rounded text-xs font-bold text-white">[[ e.status ]]</span></td>
                  <td class="px-4 py-3 text-gray-400">[[ formatMs(e.duration_ms) ]]</td>
                  <td class="px-4 py-3 text-gray-500">[[ formatDate(e.created_at) ]]</td>
                  <td class="px-4 py-3"><router-link :to="'/actions/' + e.action_id + '/history/' + e.id" class="text-blue-400 hover:text-blue-300 text-xs font-medium">View</router-link></td>
                </tr>
              </tbody>
            </table>
          </div>
        </AppLayout>
      `,
      components: { AppLayout },
      setup() {
        const history = ref([])
        const loading = ref(false)
        const initialLoading = ref(true)
        const toast = ref('')
        const cleaning = ref(false)
        let pollTimer = null

        async function refresh() {
          loading.value = true
          try {
            var h = await fetchJSON('/api/history')
            history.value = Array.isArray(h) ? h : []
          } catch (e) { console.error(e); history.value = [] }
          loading.value = false
          initialLoading.value = false
        }

        async function poll() {
          var running = history.value.filter(e => e.status === 'RUNNING').map(e => e.id)
          var url = running.length > 0 ? '/api/history?ids=' + running.join(',') : '/api/history'
          try {
            var h = await fetchJSON(url)
            history.value = patchHistory(history.value, h)
          } catch (e) { console.error(e) }
        }

        async function cleanLogs() {
          if (cleaning.value) return
          cleaning.value = true
          try {
            await fetch('/api/clean', { method: 'POST' })
            toast.value = 'Logs cleaned'
            setTimeout(() => { toast.value = '' }, 3000)
            refresh()
          } catch (e) { alert('Clean failed: ' + e.message) }
          finally { cleaning.value = false }
        }

        onMounted(function() {
          refresh()
          pollTimer = setInterval(poll, 3000)
        })

        onUnmounted(function() {
          if (pollTimer) clearInterval(pollTimer)
        })

        return { history, loading, initialLoading, toast, cleaning, refresh, cleanLogs, statusClass, formatMs, formatDate }
      }
    }

    const ActionList = {
      delimiters: ['[[', ']]'],
      template: `
        <AppLayout>
          <h1 class="text-2xl font-semibold mb-6">Actions</h1>
          <div v-if="loading" class="text-gray-600 text-sm">Loading...</div>
          <div v-else-if="actions.length === 0" class="text-gray-600 text-sm bg-gray-900 rounded-lg border border-gray-800 px-4 py-8 text-center">
            No actions found. Place YAML files in <code class="text-emerald-400">actions/&lt;id&gt;.yml</code>
          </div>
          <div v-else class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
            <div v-for="a in actions" :key="a.id" class="bg-gray-900 border border-gray-800 rounded-lg p-4">
              <div class="flex items-center justify-between mb-2">
                <router-link :to="'/actions/' + a.id" class="font-semibold text-emerald-400 hover:underline truncate">[[ a.name || a.id ]]</router-link>
                <span class="text-[10px] px-1.5 py-0.5 bg-gray-700 text-gray-300 rounded font-mono ml-2 shrink-0">[[ formatTimeout(a.timeout) ]]</span>
              </div>
              <div class="text-[11px] text-gray-500 font-mono truncate mb-3" :title="a.command">[[ a.command ]]</div>
              <button @click="trigger(a.id)" class="w-full px-3 py-1.5 bg-emerald-600/20 hover:bg-emerald-600/30 border border-emerald-500/30 rounded text-xs text-emerald-400 font-medium transition">Run</button>
            </div>
          </div>
        </AppLayout>
      `,
      components: { AppLayout },
      setup() {
        const actions = ref([])
        const loading = ref(true)
        const router = useRouter()

        async function refresh() {
          loading.value = true
          try {
            var a = await fetchJSON('/api/actions')
            actions.value = Array.isArray(a) ? a : []
          } catch (e) { console.error(e); actions.value = [] }
          loading.value = false
        }

        async function trigger(id) {
          await fetch('/api/actions/' + id + '/trigger', { method: 'POST' })
          router.push('/')
        }

        onMounted(function() { refresh() })

        return { actions, loading, trigger, formatTimeout }
      }
    }

    const ActionDetail = {
      delimiters: ['[[', ']]'],
      template: `
        <AppLayout>
          <div v-if="loading" class="text-gray-600 text-sm">Loading...</div>
          <template v-else>
            <div v-if="actionDef" class="mb-8 bg-gray-900 border border-gray-800 rounded-lg p-6">
              <div class="flex items-center justify-between mb-4">
                <h1 class="text-xl font-semibold text-emerald-400">[[ actionDef.name ]]</h1>
                <button @click="trigger" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-sm font-medium transition">Run</button>
              </div>
              <div class="space-y-2 text-sm font-mono text-gray-400">
                <div><span class="text-gray-600">ID:</span> [[ actionDef.id ]]</div>
                <div><span class="text-gray-600">Timeout:</span> [[ actionDef.timeout ]]s</div>
                <div><span class="text-gray-600">CWD:</span> [[ actionDef.cwd ]]</div>
              </div>
              <div class="mt-4">
                <span class="text-gray-600 text-sm">Command:</span>
                <pre class="mt-2 p-4 bg-gray-950 rounded-lg text-sm text-gray-300 whitespace-pre-wrap">[[ actionDef.command ]]</pre>
              </div>
            </div>
            <div v-else class="text-gray-600 mb-8">Action not found.</div>

            <h2 class="text-lg font-semibold mb-4 text-gray-300">Execution History</h2>
            <div v-if="filtered.length === 0" class="text-gray-600 text-sm bg-gray-900 rounded-lg border border-gray-800 px-4 py-8 text-center">No executions yet.</div>
            <template v-else>
              <div class="overflow-x-auto rounded-lg border border-gray-800">
                <table class="w-full text-sm">
                  <thead class="bg-gray-900 text-gray-400 uppercase text-xs">
                    <tr>
                      <th class="px-4 py-3 text-left w-16">ID</th>
                      <th class="px-4 py-3 text-left w-28">Status</th>
                      <th class="px-4 py-3 text-left w-24">Duration</th>
                      <th class="px-4 py-3 text-left w-48">Time</th>
                      <th class="px-4 py-3 text-left w-20">Log</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-gray-800/60">
                    <tr v-for="e in paged" :key="e.id" class="hover:bg-gray-900/50 transition">
                      <td class="px-4 py-3 font-mono text-gray-600">[[ e.id ]]</td>
                      <td class="px-4 py-3"><span :class="statusClass(e.status)" class="px-2 py-1 rounded text-xs font-bold text-white">[[ e.status ]]</span></td>
                      <td class="px-4 py-3 text-gray-400">[[ formatMs(e.duration_ms) ]]</td>
                      <td class="px-4 py-3 text-gray-500">[[ formatDate(e.created_at) ]]</td>
                      <td class="px-4 py-3"><router-link :to="'/actions/' + e.action_id + '/history/' + e.id" class="text-blue-400 hover:text-blue-300 text-xs font-medium">View</router-link></td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div v-if="tp > 1" class="flex items-center justify-between mt-4 text-sm text-gray-400">
                <span>[[ (p - 1) * perPage + 1 ]]-[[ Math.min(p * perPage, filtered.length) ]] of [[ filtered.length ]]</span>
                <div class="flex gap-2">
                  <button @click="p = Math.max(1, p - 1)" :disabled="p === 1" class="px-3 py-1 rounded border border-gray-700 disabled:opacity-40 hover:bg-gray-800 transition">Prev</button>
                  <button v-for="n in pr" :key="n" @click="p = n" :class="n === p ? 'bg-emerald-600 text-white' : 'border border-gray-700 hover:bg-gray-800'" class="px-3 py-1 rounded transition">[[ n ]]</button>
                  <button @click="p = Math.min(tp, p + 1)" :disabled="p === tp" class="px-3 py-1 rounded border border-gray-700 disabled:opacity-40 hover:bg-gray-800 transition">Next</button>
                </div>
              </div>
            </template>
          </template>
        </AppLayout>
      `,
      components: { AppLayout },
      setup() {
        const route = useRoute()
        const router = useRouter()
        const actionDef = ref(null)
        const history = ref([])
        const loading = ref(true)
        const p = ref(1)
        const perPage = 20
        let pollTimer = null

        const filtered = computed(() => {
          var h = history.value
          if (!Array.isArray(h)) return []
          var aid = route.params && route.params.id ? route.params.id : ''
          return h.filter(function(e) { return e.action_id === aid })
        })
        const tp = computed(function() {
          return Math.max(1, Math.ceil(filtered.value.length / perPage))
        })
        const paged = computed(function() {
          var start = (p.value - 1) * perPage
          return filtered.value.slice(start, start + perPage)
        })
        const pr = computed(function() {
          var pages = []
          var max = Math.min(5, tp.value)
          var s = Math.max(1, p.value - 2)
          for (var i = 0; i < max; i++) pages.push(s + i)
          return pages
        })

        function hasRunning() {
          for (var i = 0; i < filtered.value.length; i++) {
            if (filtered.value[i].status === 'RUNNING') return true
          }
          return false
        }

        async function refresh() {
          try {
            var actions = await fetchJSON('/api/actions')
            actionDef.value = null
            for (var i = 0; i < actions.length; i++) {
              if (actions[i].id === route.params.id) { actionDef.value = actions[i]; break }
            }
            var h = await fetchJSON('/api/history')
            history.value = Array.isArray(h) ? h : []
            if (p.value > tp.value) p.value = 1
          } catch (e) { console.error(e); history.value = [] }
          loading.value = false
        }

        async function poll() {
          var running = history.value.filter(e => e.status === 'RUNNING').map(e => e.id)
          if (running.length === 0) return
          try {
            var h = await fetchJSON('/api/history?ids=' + running.join(','))
            history.value = patchHistory(history.value, h)
          } catch (e) { console.error(e) }
        }

        function togglePolling() {
          if (hasRunning()) {
            if (!pollTimer) pollTimer = setInterval(poll, 3000)
          } else {
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null }
          }
        }

        async function trigger() {
          try {
            await fetch('/api/actions/' + route.params.id + '/trigger', { method: 'POST' })
            refresh()
          } catch (e) { console.error(e) }
        }

        onMounted(function() { refresh().then(togglePolling) })
        onUnmounted(function() { if (pollTimer) clearInterval(pollTimer) })
        watch(function() { return route.params && route.params.id }, function() {
          if (pollTimer) { clearInterval(pollTimer); pollTimer = null }
          p.value = 1; loading.value = true; refresh().then(togglePolling)
        })
        watch(filtered, function() { togglePolling() })

        return { actionDef, filtered, paged, p, perPage, tp, pr, loading, trigger, statusClass, formatMs, formatDate }
      }
    }

    const LogView = {
      delimiters: ['[[', ']]'],
      template: `
        <AppLayout>
          <div v-if="loading" class="text-gray-600">Loading...</div>
          <template v-else>
            <div v-if="entry" class="mb-6 flex items-center gap-4 flex-wrap">
              <span :class="statusClass(entry.status)" class="px-3 py-1.5 rounded text-sm font-bold text-white">[[ entry.status ]]</span>
              <span class="text-gray-500 text-sm">Action: <router-link :to="'/actions/' + entry.action_id" class="text-emerald-400 font-mono hover:underline">[[ entry.action_id ]]</router-link></span>
              <span class="text-gray-500 text-sm">Duration: <span class="text-gray-300">[[ formatMs(entry.duration_ms) ]]</span></span>
              <span class="text-gray-500 text-sm">Started: <span class="text-gray-300">[[ formatDate(entry.created_at) ]]</span></span>
            </div>
            <pre class="bg-gray-900 border border-gray-800 rounded-lg p-4 font-mono text-xs text-gray-300 leading-relaxed overflow-auto max-h-[70vh]">[[ logContent || 'No log content.' ]]</pre>
          </template>
        </AppLayout>
      `,
      components: { AppLayout },
      setup() {
        const route = useRoute()
        const entry = ref(null)
        const logContent = ref('')
        const loading = ref(true)
        let pollTimer = null

        async function refresh() {
          try {
            var hid = route.params && route.params.hid ? parseInt(route.params.hid) : 0
            var h = await fetchJSON('/api/history?ids=' + hid)
            if (Array.isArray(h) && h.length > 0) {
              entry.value = h[0]
            }
            var lres = await fetch('/api/logs/' + hid)
            if (lres.ok) logContent.value = await lres.text()
          } catch (e) { console.error(e) }
          loading.value = false
        }

        onMounted(function() {
          refresh()
          pollTimer = setInterval(refresh, 3000)
        })

        onUnmounted(function() {
          if (pollTimer) clearInterval(pollTimer)
        })

        return { entry, logContent, loading, statusClass, formatMs, formatDate }
      }
    }

    const routes = [
      { path: '/', component: Dashboard },
      { path: '/actions', component: ActionList },
      { path: '/actions/:id', component: ActionDetail },
      { path: '/actions/:id/history/:hid', component: LogView },
      { path: '/executions', component: ExecutionList },
    ]

    const router = createRouter({
      history: createWebHistory(),
      routes,
    })

    createApp({
      delimiters: ['[[', ']]'],
      template: '<router-view></router-view>',
    }).use(router).mount('#app')
  </script>
</body>
</html>
